name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Windows-only: exclude the workspace, Bun cache, and the processes we
      # actually run from Defender real-time scanning. Defender is the dominant
      # cost on hosted Windows runners — each file write + each `bun`/`node`
      # spawn pays a scan tax. We're in an ephemeral VM with no untrusted
      # workload; this is a CI-only optimization.
      - name: Disable Windows Defender for workspace and toolchain
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:TEMP"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.bun"
          Add-MpPreference -ExclusionProcess "bun.exe"
          Add-MpPreference -ExclusionProcess "node.exe"
          Add-MpPreference -ExclusionProcess "npm.cmd"
          Add-MpPreference -ExclusionProcess "git.exe"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned floor for `bun test --parallel` (Bun ≥ 1.3.13).
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Canonical CI
        env:
          SUPIPOWERS_CI_PROFILE: ${{ runner.os == 'Windows' && 'windows-fast' || 'default' }}
        run: bun run ci

      - name: Build
        run: bun run build

      - name: MemPalace uv install smoke
        env:
          MEMPALACE_UV_INSTALL_SMOKE: "1"
        run: bun test --timeout 180000 tests/mempalace/uv-install-smoke.test.ts
